# =============================================================================
# OpenClaw + OpenCode Orchestration System
# docker compose up -d で起動
# =============================================================================

name: openclaw-orchestration

services:

  # ---------------------------------------------------------------------------
  # OpenClaw Gateway — コントロールプレーン + WebChat UI
  # WebChat UI: http://localhost:18789
  # ---------------------------------------------------------------------------
  openclaw-gateway:
    image: ghcr.io/openwrt-ai/openclaw:latest   # 公式イメージ (要確認・差し替え)
    # ローカルビルドを使う場合は以下を有効化し image: 行を削除
    # build:
    #   context: ./openclaw-build
    container_name: openclaw-gateway
    restart: unless-stopped
    init: true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      # Gateway認証
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      # LLMプロバイダーキー (スキル実行に使用)
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      # OpenCodeサーバー認証情報 (スキルから参照)
      OPENCODE_SERVER_URL: http://opencode-server:4096
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD}
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME:-opencode}
    volumes:
      # OpenClaw 設定
      - ./openclaw/openclaw.json:/home/node/.openclaw/openclaw.json:ro
      # カスタムスキルをマウント
      - ./openclaw/skills:/home/node/.openclaw/skills:ro
      # 永続化: セッション・履歴
      - openclaw-data:/home/node/.openclaw
      # プロジェクトをOpenClawから参照可能に (読み取り専用)
      - ./projects:/home/node/projects:ro
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"   # WebChat / Gateway / Control UI
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"     # Bridge (ノード接続用)
    networks:
      - openclaw-net
    depends_on:
      opencode-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # OpenCode Server — ヘッドレスコーディングエージェント
  # API: http://localhost:4096 (OpenAPI: http://localhost:4096/doc)
  # ---------------------------------------------------------------------------
  opencode-server:
    build:
      context: ./opencode
      dockerfile: Dockerfile
    container_name: opencode-server
    restart: unless-stopped
    environment:
      # LLMプロバイダー
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ap-northeast-1}
      # サーバー認証
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD}
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME:-opencode}
      # モデル設定
      OPENCODE_MODEL: ${OPENCODE_MODEL:-anthropic/claude-sonnet-4-5}
      # インラインJSON設定 (opencode.json の代替として使用可)
      # OPENCODE_CONFIG_CONTENT: '{"model":"anthropic/claude-sonnet-4-5"}'
    volumes:
      # OpenCode 設定ファイル
      - ./opencode/opencode.json:/workspace/opencode.json:ro
      # 開発対象プロジェクト (読み書き可)
      - ./projects:/workspace/projects:rw
      # OpenCode の内部状態を永続化 (セッション履歴など)
      - opencode-data:/root/.local/share/opencode
    working_dir: /workspace
    ports:
      # 外部から直接アクセスしたい場合にコメントを外す
      # - "${OPENCODE_SERVER_PORT:-4096}:4096"
      - "4096:4096"
    networks:
      - openclaw-net
    healthcheck:
      test: ["CMD", "/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    # リソース制限 (Mac Docker Desktop 向け)
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G

# =============================================================================
# ネットワーク
# =============================================================================
networks:
  openclaw-net:
    name: openclaw-net
    driver: bridge

# =============================================================================
# ボリューム
# =============================================================================
volumes:
  # OpenClaw の永続データ (セッション・履歴・スキル状態)
  openclaw-data:
    name: openclaw-orchestration_openclaw-data

  # OpenCode の永続データ (セッション履歴・SQLite DB)
  opencode-data:
    name: openclaw-orchestration_opencode-data
